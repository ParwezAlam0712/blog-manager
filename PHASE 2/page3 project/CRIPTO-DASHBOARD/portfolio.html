<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - CryptoDash Pro</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header class="header">

    <button class="menu-toggle">
      ☰
    </button>

    <h1 class="logo">
      🚀 CryptoDash Pro
    </h1>

    <div class="header-actions">

      <button id="themeToggle">
        🌙 Dark Mode
      </button>

      <button id="notificationBtn">
        🔔 Notifications
      </button>

    </div>

  </header>

  <div class="page-layout">

    <aside class="sidebar">

      <a href="index.html">Dashboard</a>
      <a href="watchlist.html">Watchlist</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="market.html">Markets</a>
      <a href="news.html">News</a>

    </aside>

    <main class="main-content">

      <h2>My Portfolio</h2>

      <div class="portfolio-form">

        <input type="text" id="coinName" placeholder="Coin Name">

        <input type="number" id="coinAmount" placeholder="Amount">

        <button id="addPortfolioBtn">
          Add Coin
        </button>

      </div>
      <div class="card">
        <h3>Total Holdings</h3>
        <p id="totalHoldings">$0</p>
      </div>
      <div id="portfolioContainer"></div>

    </main>

  </div>

  <script src="js/menu.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/portfolio.js"></script>

</body>

</html>
